spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mongodb:
    uri: mongodb://localhost:27017/myapp_db

app:
  jwt:
    secret: YOUR_JWT_SECRET_KEY
    expiration-ms: 86400000

  upload:
    dir: uploads/